<div style="font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px 20px;">
    <div style="max-width: 520px; margin: 0 auto; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06);">
        
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #a58fdf 0%, #8b6fd4 100%); padding: 32px 40px; text-align: center;">
            <div style="font-size: 28px; margin-bottom: 8px;">✉️</div>
            <h1 style="color: #ffffff; font-size: 20px; font-weight: 700; margin: 0;">New Message Received</h1>
            <p style="color: rgba(255,255,255,0.8); font-size: 13px; margin: 6px 0 0;">From your portfolio contact form</p>
        </div>

        <!-- Body -->
        <div style="padding: 36px 40px;">
            
            <!-- Sender Info -->
            <div style="text-align: center; margin-bottom: 28px;">
                <div style="width: 56px; height: 56px; background-color: #f0ebf7; border-radius: 50%; margin: 0 auto 14px; line-height: 56px; font-size: 24px;">👤</div>
                <div style="font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 4px;">{{user_name}}</div>
                <a href="mailto:{{user_email}}" style="font-size: 13px; color: #a58fdf; text-decoration: none;">{{user_email}}</a>
            </div>

            <!-- Divider -->
            <div style="border-top: 1px dashed #e2e8f0; margin: 0 0 24px;"></div>

            <!-- Message -->
            <div style="background-color: #f8f9fa; border-radius: 12px; padding: 20px 24px; border-left: 3px solid #a58fdf;">
                <p style="font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px;">Message</p>
                <p style="font-size: 15px; color: #334155; line-height: 1.7; margin: 0; white-space: pre-wrap;">{{message}}</p>
            </div>
        </div>

        <!-- Footer -->
        <div style="padding: 20px 40px; background-color: #f8f9fa; border-top: 1px solid #f1f5f9; text-align: center;">
            <p style="font-size: 12px; color: #94a3b8; margin: 0;">
                Sent via <strong>Bibi Mariyam</strong> Portfolio &bull; {{to_email}}
            </p>
        </div>
    </div>
</div>
